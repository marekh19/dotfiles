# Fix colors
set -g default-terminal "tmux-256color"

# undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colours - needs tmux-3.0
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Default prefix (aka leader key) Ctrl + A
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Kill pane without confirm dialog
bind-key x kill-pane

# Horizontal & Vertical splits
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Refresh tmux config
bind R source-file ~/.config/tmux/tmux.conf 

# Resize panes
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Zoom pane (maximize)
bind -r m resize-pane -Z

# Kill window without confirm dialog
bind-key & kill-window

# Window 1 based indexing
set -g base-index 1

# Renumber windows on window close
set -g renumber-windows on

# Enable mouse
set -g mouse on

# Allow Shift+Enter to work (Kitty/Ghostty sends \e[13;2u for Shift+Enter)
bind -n S-Enter send-keys "\e[13;2u"

# Clear screen - with prefix
bind C-l send-keys 'C-l'

# Make left module wider so session name is not truncated (default length is 10)
set -g status-left-length 40

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

# tmux plugins
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto save and auto restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# tmux-dotbar config
# zenbones tokyobones dark
set -g @tmux-dotbar-bg "#1A1B26"          # background — blends with terminal
set -g @tmux-dotbar-fg "#36384D"          # bright black — subtle inactive windows
set -g @tmux-dotbar-fg-current "#C0CAF5"  # foreground — clear active window
set -g @tmux-dotbar-fg-session "#7BA2F7"  # blue — session name stands out without competing
set -g @tmux-dotbar-fg-prefix "#BB9BF7"   # magenta/purple — eye-catching prefix indicator

set -g @tmux-dotbar-right true
set -g @tmux-dotbar-window-status-format " [#I] #W "

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
